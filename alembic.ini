# BookScout Alembic configuration
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
script_location = db/migrations
prepend_sys_path = .
version_path_separator = os

# sqlalchemy.url is set dynamically in env.py from DATABASE_URL env var.
# You can override it here for local development:
# sqlalchemy.url = postgresql+asyncpg://bookscout:bookscout@localhost/bookscout

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
