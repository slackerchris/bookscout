version: '3.8'

services:
  # ── DB migrations (runs once, exits) ──────────────────────────────────────
  migrate:
    image: ghcr.io/slackerchris/bookscout:latest
    container_name: bookscout-migrate
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://bookscout:${POSTGRES_PASSWORD:-bookscout}@postgres/bookscout
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - bookscout

  # ── API service ───────────────────────────────────────────────────────────
  bookscout:
    image: ghcr.io/slackerchris/bookscout:latest
    container_name: bookscout
    ports:
      - "8000:8000"
    volumes:
      - bookscout-data:/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://bookscout:${POSTGRES_PASSWORD:-bookscout}@postgres/bookscout
      - REDIS_URL=redis://redis:6379
      - BOOKSCOUT_CONFIG=/data/config.yaml
      # Optional env-var overrides (or put these in /data/config.yaml instead)
      - AUDIOBOOKSHELF_URL=${AUDIOBOOKSHELF_URL:-}
      - AUDIOBOOKSHELF_TOKEN=${AUDIOBOOKSHELF_TOKEN:-}
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-bookscout-secret-key-change-in-production}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bookscout

  # ── Background worker (arq) ───────────────────────────────────────────────
  worker:
    image: ghcr.io/slackerchris/bookscout:latest
    container_name: bookscout-worker
    command: ["arq", "workers.settings.WorkerSettings"]
    volumes:
      - bookscout-data:/data
    environment:
      - DATABASE_URL=postgresql+asyncpg://bookscout:${POSTGRES_PASSWORD:-bookscout}@postgres/bookscout
      - REDIS_URL=redis://redis:6379
      - BOOKSCOUT_CONFIG=/data/config.yaml
      - AUDIOBOOKSHELF_URL=${AUDIOBOOKSHELF_URL:-}
      - AUDIOBOOKSHELF_TOKEN=${AUDIOBOOKSHELF_TOKEN:-}
      - PROWLARR_URL=${PROWLARR_URL:-}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - bookscout

  postgres:
    image: postgres:16-alpine
    container_name: bookscout-postgres
    environment:
      POSTGRES_DB: bookscout
      POSTGRES_USER: bookscout
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bookscout}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookscout"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bookscout

  redis:
    image: redis:7-alpine
    container_name: bookscout-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - bookscout

networks:
  bookscout:
    driver: bridge

volumes:
  bookscout-data:
  postgres-data:
  redis-data:
